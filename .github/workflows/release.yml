name: release

# Publish to PyPI on a version tag. Uses PyPI Trusted Publishing (OIDC) — no
# stored token. One-time setup: on pypi.org add a Trusted Publisher for project
# "kanbot" pointing at publu/kanbot, workflow "release.yml", environment "pypi".
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write          # required for trusted publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Sanity-check the wheel bundles the UI
        run: |
          python - <<'PY'
          import glob, zipfile, sys
          whl = sorted(glob.glob("dist/*.whl"))[-1]
          names = zipfile.ZipFile(whl).namelist()
          need = ["kanbot/server/static/app.js", "kanbot/server/static/index.html"]
          missing = [n for n in need if n not in names]
          sys.exit("missing from wheel: " + ", ".join(missing) if missing else 0)
          PY
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
