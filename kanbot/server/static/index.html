<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KanBot · agent control room</title>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234f8cff'/><text x='50' y='72' font-size='60' font-family='monospace' font-weight='800' text-anchor='middle' fill='%23ffffff'>K</text></svg>" />
</head>
<body>
  <div id="app">
    <!-- top bar -->
    <header class="topbar">
      <div class="brand">
        <div class="mark">K</div>
        <div>
          <div class="name">Kan<span>Bot</span></div>
        </div>
        <span class="ver" id="version"></span>
      </div>

      <div class="spacer"></div>

      <div class="runners" id="runners"></div>
      <button class="btn ghost small" id="profileBtn" title="What KanBot has learned about your work (p)">◎ profile</button>
      <button class="btn ghost small" id="newTaskBtn" title="Create a one-off task for an agent (n)">＋ task</button>
      <button class="btn primary small" id="workflowsBtn" title="Automations — multi-step runs (w)">⛓ automations</button>
      <button class="btn ghost small" id="sessionsBtn" title="Recent agent sessions (Claude, Codex, …)">⟳ sessions <span id="liveBadge" class="live-badge hidden">0</span></button>
      <button class="btn ghost small" id="manageTagsBtn" title="Manage tags">🏷 tags</button>
      <button class="btn ghost small" id="apiBtn" title="Full API reference">&lt;/&gt; API</button>
    </header>

    <!-- board -->
    <main class="board" id="board"></main>

    <!-- TUI status / keybind bar -->
    <footer class="statusbar" id="statusbar"></footer>
  </div>

  <!-- command palette -->
  <div class="palette-scrim" id="paletteScrim">
    <div class="palette" id="palette">
      <div class="palette-in"><span class="palette-prompt">❯</span><input id="paletteInput" class="palette-input" placeholder="type a command…" autocomplete="off" spellcheck="false" /></div>
      <div class="palette-list" id="paletteList"></div>
    </div>
  </div>

  <!-- boot splash -->
  <div class="boot" id="boot"></div>

  <!-- onboarding: scan your sessions, reveal what you build, you pick -->
  <div class="onboard" id="onboard"></div>

  <!-- card drawer -->
  <div class="drawer-scrim" id="drawerScrim"></div>
  <aside class="drawer" id="drawer">
    <div class="drawer-head">
      <input class="title-input" id="dTitle" placeholder="Task title" />
      <button class="x" id="drawerClose">×</button>
    </div>
    <div class="drawer-body" id="drawerBody"></div>
  </aside>

  <!-- automations: a full-screen surface (not a modal) with internal nav -->
  <section class="auto-view" id="autoView"></section>

  <!-- modal -->
  <div class="modal-scrim" id="modalScrim">
    <div class="modal" id="modal"></div>
  </div>

  <div class="toast-wrap" id="toasts"></div>

  <script type="module" src="/app.js"></script>
</body>
</html>
